# 从 docs/analysis/ 构建 just-the-docs 站点并部署到 GitHub Pages。
# 用 GitHub 官方 jekyll-build-pages(内置 github-pages gem 全套:remote_theme /
# seo-tag / include-cache),与其他代码分析站(colibri-analysis 等)同一套,样式一致。
# 需在 Settings → Pages → Source 选 "GitHub Actions"。
name: Deploy analysis site

on:
  push:
    branches: [main]
    paths:
      - 'docs/analysis/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 分析文档里的源码引用是仓内相对路径(../../src/...);发布站上不存在这些路径,
      # 构建前把它们改写成 GitHub blob 绝对链接(仅在 runner 的 checkout 上改,不动仓库)。
      - name: Rewrite source links for Pages
        run: |
          cd docs/analysis
          sed -i 's|](\.\./\.\./|](https://github.com/chen3feng/nuthatch/blob/main/|g' *.md

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: docs/analysis

      - uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
