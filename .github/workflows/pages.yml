# 从 docs/analysis/ 构建 just-the-docs 站点并部署到 GitHub Pages。
# 需在仓库 Settings → Pages → Source 选 "GitHub Actions"(本工作流也尝试自动启用)。
name: Deploy analysis site

on:
  push:
    branches: [main]
    paths:
      - 'docs/analysis/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 只允许一个并发部署。
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: docs/analysis
      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Jekyll build (source = docs/analysis)
        working-directory: docs/analysis
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/analysis/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
